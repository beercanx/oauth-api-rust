name: Rust

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

  # Make sure CI fails on all warnings, including Clippy lints
  # RUSTFLAGS: "-Dwarnings"

jobs:
  build:

    # Required to use the reviewdog tool.
    permissions:
      checks: write
      pull-requests: write

    strategy:
      matrix:
        platform:
          - os: ubuntu

    runs-on: ${{ matrix.platform.os }}-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: reviewdog setup
        uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252 # v1.4.0
        with:
          reviewdog_version: v0.21.0

      - name: Display build versions
        run: |
          cargo --version
          rustc --version
          rustup toolchain list
          cargo clippy --version
          reviewdog -version

      - name: Check
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          cargo check -q --message-format=short |
          reviewdog -f=cargo-check -name="Cargo Check" -reporter=github-check -filter-mode=nofilter -fail-level=warning

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Clippy
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          cargo clippy --all-targets --all-features --color never -q --message-format=short |
          reviewdog -f=clippy -name="Clippy" -reporter=github-check -filter-mode=nofilter -fail-level=error
