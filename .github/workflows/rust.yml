name: Rust

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

  # Make sure CI fails on all warnings, including Clippy lints
  # RUSTFLAGS: --deny warnings

jobs:
  build:

    strategy:
      matrix:
        platform:
          - os: ubuntu

    runs-on: ${{ matrix.platform.os }}-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Display build versions
        run: |
          cargo --version
          rustc --version
          rustup toolchain list
          cargo clippy --version

      - name: Check
        run: cargo check -q --all-targets --all-features

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -q --all-targets --all-features

      - name: Test Check Annotation
        run: echo '::warning file=src/client/secret.rs,line=9,endLine=9,col=12,endColumn=24,title=Check::field `id` is never read'

      - name: Test Clippy Annotation
        run: echo '::error file=src/graceful_shutdown.rs,line=9,endLine=11,col=9,endColumn=56,title=Clippy::used `expect()` on a `Result` value'
